version: '3.8'

services:
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    ports:
      - "7000:6379"
    volumes:
      - ./redis-node.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server','/usr/local/etc/redis/redis.conf']
    networks:
      - redis-cluster
  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
    ports:
      - "7001:6379"
    volumes:
      - ./redis-node.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server','/usr/local/etc/redis/redis.conf']
    networks:
      - redis-cluster
  redis-node-3:
    image: redis:7-alpine
    container_name: redis-node-3
    ports:
      - "7002:6379"
    volumes:
      - ./redis-node.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server','/usr/local/etc/redis/redis.conf']
    networks:
      - redis-cluster
  redis-node-4:
    image: redis:7-alpine
    container_name: redis-node-4
    ports:
      - "7003:6379"
    volumes:
      - ./redis-node.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server','/usr/local/etc/redis/redis.conf']
    networks:
      - redis-cluster
  redis-node-5:
    image: redis:7-alpine
    container_name: redis-node-5
    ports:
      - "7004:6379"
    volumes:
      - ./redis-node.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server','/usr/local/etc/redis/redis.conf']
    networks:
      - redis-cluster
  redis-node-6:
    image: redis:7-alpine
    container_name: redis-node-6
    ports:
      - "7005:6379"
    volumes:
      - ./redis-node.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server','/usr/local/etc/redis/redis.conf']
    networks:
      - redis-cluster

  # --- Redis Sentinel HA Setup ---
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    command: redis-server --appendonly yes
    networks:
      - redis-cluster

  redis-replica:
    image: redis:7-alpine
    container_name: redis-replica
    command: redis-server --replicaof redis-master 6379 --appendonly yes
    depends_on:
      - redis-master
    networks:
      - redis-cluster

  redis-sentinel-1:
    image: redis:7-alpine
    container_name: redis-sentinel-1
    command: >
      sh -c "echo 'port 26379' > sentinel.conf &&
      echo 'sentinel monitor mymaster redis-master 6379 2' >> sentinel.conf &&
      echo 'sentinel down-after-milliseconds mymaster 5000' >> sentinel.conf &&
      echo 'sentinel failover-timeout mymaster 60000' >> sentinel.conf &&
      echo 'sentinel parallel-syncs mymaster 1' >> sentinel.conf &&
      redis-server sentinel.conf --sentinel"
    depends_on:
      - redis-master
      - redis-replica
    networks:
      - redis-cluster

  redis-sentinel-2:
    image: redis:7-alpine
    container_name: redis-sentinel-2
    command: >
      sh -c "echo 'port 26379' > sentinel.conf &&
      echo 'sentinel monitor mymaster redis-master 6379 2' >> sentinel.conf &&
      echo 'sentinel down-after-milliseconds mymaster 5000' >> sentinel.conf &&
      echo 'sentinel failover-timeout mymaster 60000' >> sentinel.conf &&
      echo 'sentinel parallel-syncs mymaster 1' >> sentinel.conf &&
      redis-server sentinel.conf --sentinel"
    depends_on:
      - redis-master
      - redis-replica
    networks:
      - redis-cluster

  redis-sentinel-3:
    image: redis:7-alpine
    container_name: redis-sentinel-3
    command: >
      sh -c "echo 'port 26379' > sentinel.conf &&
      echo 'sentinel monitor mymaster redis-master 6379 2' >> sentinel.conf &&
      echo 'sentinel down-after-milliseconds mymaster 5000' >> sentinel.conf &&
      echo 'sentinel failover-timeout mymaster 60000' >> sentinel.conf &&
      echo 'sentinel parallel-syncs mymaster 1' >> sentinel.conf &&
      redis-server sentinel.conf --sentinel"
    depends_on:
      - redis-master
      - redis-replica
    networks:
      - redis-cluster

  # helper service to initialize the cluster
  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    volumes:
      - ./init-cluster.sh:/init-cluster.sh
    entrypoint: ['/bin/sh','/init-cluster.sh']
    networks:
      - redis-cluster

  backend:
    build: .
    container_name: backend-service
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - IS_DOCKER=true
      - USE_SENTINEL=true
      - PORT=3000
    depends_on:
      - redis-cluster-init
    networks:
      - redis-cluster

networks:
  redis-cluster:
    driver: bridge